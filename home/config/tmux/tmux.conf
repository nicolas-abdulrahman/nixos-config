# Enable the status bar
set-option -g status on

# Set the status bar position (top or bottom)
set-option -g status-position top 

# Set the status bar background and foreground colors
set-option -g status-bg colour235
set-option -g status-fg colour136

# Set the status bar left section
set-option -g status-left-length 50
set-option -g status-left "#[fg=colour7,bg=colour241] #S #[fg=colour241,bg=colour235]"

# Set the status bar right section
set-option -g status-right-length 150
# FIXED: Removed 'aaa' and 'b', and replaced #(pwd) with #{pane_current_path}
set-option -g status-right "#[fg=colour241,bg=colour235]#[fg=colour7,bg=colour241] #[fg=colour235,bg=colour7] #{pane_current_path} "

# Set the window status format
set-option -g window-status-format "#[fg=colour7,bg=colour235] #I:#W "
set-option -g window-status-current-format "#[fg=colour235,bg=colour136]#[fg=colour7,bg=colour136] #I:#W #[fg=colour136,bg=colour235]"

# Set the window status separator
set-option -g window-status-separator ""

# Set the status bar refresh interval (in seconds)
set-option -g status-interval 1
unbind-key -a


set-option -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix



bind-key  h select-window -t :-
bind-key  l select-window -t :+
bind-key  0 select-window -t 0
bind-key  1 select-window -t 1
bind-key  2 select-window -t 2
bind-key  3 select-window -t 2
bind-key  4 select-window -t 2

bind-key  M-0 if-shell "tmux has-session -t 0 2>/dev/null" "switch-client -t 0" "new-session -s 0"
bind-key  M-1 if-shell "tmux has-session -t 1 2>/dev/null" "switch-client -t 1" "new-session -s 1"
bind-key  M-2 if-shell "tmux has-session -t 2 2>/dev/null" "switch-client -t 2" "new-session -s 2"
bind-key  M-3 if-shell "tmux has-session -t 3 2>/dev/null" "switch-client -t 3" "new-session -s 3"
bind-key  M-4 if-shell "tmux has-session -t 4 2>/dev/null" "switch-client -t 4" "new-session -s 4"
bind-key  M-5 if-shell "tmux has-session -t 5 2>/dev/null" "switch-client -t 5" "new-session -s 5"

bind-key -n C-Left resize-pane -L 5
bind-key -n C-Right resize-pane -R 5
bind-key -n C-Up resize-pane -U 6
bind-key -n C-Down resize-pane -D 6

bind-key / split-window -h
bind-key - split-window -v -l 3 -c "#{pane_current_path}"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE 'g?(view|l?n?vim?x?(-wrapped)?|nvf|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key \; command-prompt
bind-key q kill-pane
bind-key d detach-client

# When creating a new session, run neofetch in the first pane
set-option -g default-command 'exec zsh'

bind-key n new-window -c "#{pane_current_path}"
bind-key r source-file /etc/nixos/home/modules/tmux/tmux.conf
